<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員後台 - 報告生成</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/form-style.css">
    <style>
        .admin-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .generate-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
        }
        .generate-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .generate-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        .status-msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-error { color: #e74c3c; }
        .status-success { color: #10b981; }
    </style>
</head>
<body class="form-page">

    <div class="header-bar">
        <span>管理員後台 - 歡迎，{{ session.get('name', 'Admin') }}</span>
        <button class="logout-btn" onclick="logout()">登出</button>
    </div>

    <div class="admin-container">
        <div class="admin-card">
            <h2 style="margin-top: 0; color: var(--accent);">生成參與者報告</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">請輸入參與者編號以生成並下載其飲食與運動記錄的 PDF 報告。</p>
            
            <div class="form-group">
                <label for="participantId">參與者編號 (ID)</label>
                <input type="text" id="participantId" placeholder="例如：P001" required>
            </div>
            
            <button id="generateBtn" class="generate-btn" onclick="generateReport()">生成並下載報告</button>
            <div id="statusMsg" class="status-msg"></div>
        </div>
    </div>

    <script>
        async function generateReport() {
            const participantId = document.getElementById('participantId').value.trim();
            const btn = document.getElementById('generateBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            if (!participantId) {
                statusMsg.textContent = '請輸入參與者編號';
                statusMsg.className = 'status-msg status-error';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '報告生成中，請稍候...';
            statusMsg.textContent = '';
            
            try {
                const response = await fetch('/api/generate-report', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ participant_id: participantId })
                });
                
                if (!response.ok) {
                    // If it's not a file, it's likely a JSON error response
                    const errorData = await response.json();
                    throw new Error(errorData.message || '生成失敗');
                }
                
                // Handle File Download
                const blob = await response.blob();
                
                // Double check if the blob is actually JSON (an error caught late)
                if (blob.type === 'application/json') {
                    const text = await blob.text();
                    const data = JSON.parse(text);
                    throw new Error(data.message || '生成失敗');
                }
                
                // Create a download link
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                // Try to extract filename from Content-Disposition header if available
                const disposition = response.headers.get('Content-Disposition');
                let filename = `dietary_report_${participantId}.pdf`;
                if (disposition && disposition.indexOf('attachment') !== -1) {
                    const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                    const matches = filenameRegex.exec(disposition);
                    if (matches != null && matches[1]) { 
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }
                
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                
                statusMsg.textContent = '報告下載成功！';
                statusMsg.className = 'status-msg status-success';
                
            } catch (error) {
                console.error('Error:', error);
                statusMsg.textContent = error.message || '發生未知錯誤，請稍後再試';
                statusMsg.className = 'status-msg status-error';
            } finally {
                btn.disabled = false;
                btn.textContent = '生成並下載報告';
            }
        }

        async function logout() {
            if (confirm('確定要登出嗎？')) {
                try {
                    const response = await fetch('/api/logout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const result = await response.json();
                    if (result.success) {
                        window.location.href = result.redirect || '/login';
                    }
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = '/login';
                }
            }
        }
    </script>
</body>
</html>
